<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add book</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4 shadow-sm">
            <h1 class="mb-4">Add Book</h1>

            <form th:object="${book}" th:action="@{/save}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="title">Title</label>
                    <input type="text" id="title" th:field="*{title}" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="category">Category</label>
                    <select th:field="*{category}" id="category">
                        <option 
                            th:each="category : ${categories}"
                            th:value="${category.categoryid}"
                            th:text="${category.name}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label"for="author">Author</label>
                    <input type="text" id="author" th:field="*{author}" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="publicationYear">Publication year</label>
                    <input type="text" id="publicationYear" th:field="*{publicationYear}" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="isbn">ISBN</label>
                    <input type="text" id="isbn" th:field="*{isbn}" />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="price">Price</label>
                    <input type="text" id="price" th:field="*{price}" />
                </div>

                <button type="submit" class="btn btn-success">Save</button>
            </form>
        </div>
    </div>
</body>
</html>
